name: CI and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

permissions:
  contents: read

jobs:
  test:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run benchmarks
        run: make bench

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install mandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y mandoc

      - name: Run tests
        run: make test

      - name: Build release artifacts
        run: make release VERSION="${GITHUB_REF_NAME}"

      - name: Install nfpm
        run: |
          go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

      - name: Install gettext
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Build distro packages (.deb/.rpm)
        run: make packages VERSION="${GITHUB_REF_NAME}"

      - name: Report binary sizes
        run: |
          cat dist/SIZES.txt
          {
            printf '## Uncompressed binary sizes\n\n'
            printf '```text\n'
            cat dist/SIZES.txt
            printf '```\n'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run benchmarks
        run: |
          mkdir -p dist
          go test -run='^$' -bench=. -benchmem -benchtime=200ms ./... | tee dist/BENCHMARKS.txt
          {
            printf '## Benchmarks\n\n'
            awk -f scripts/benchtable.awk dist/BENCHMARKS.txt
          } > dist/BENCHMARKS.md
          cat dist/BENCHMARKS.md >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          {
            printf '## Uncompressed binary sizes\n\n'
            printf '```text\n'
            cat dist/SIZES.txt
            printf '```\n\n'
            cat dist/BENCHMARKS.md
          } > dist/release-notes.md
          gh release create "${GITHUB_REF_NAME}" \
            --title "${GITHUB_REF_NAME}" \
            --notes-file dist/release-notes.md \
            dist/*.tar.gz dist/*.deb dist/*.rpm dist/checksums.txt dist/SIZES.txt dist/BENCHMARKS.md

  bump-tap:
    if: startsWith(github.ref, 'refs/tags/')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Homebrew formula bump
        env:
          GH_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          gh api repos/shellcell/homebrew-tap/dispatches \
            -f event_type=bump-formula \
            -f 'client_payload[formula]=ttysvg' \
            -f "client_payload[version]=${GITHUB_REF_NAME#v}"
